<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveSmart - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">💰</span> SaveSmart
            </a>
            <button class="nav-toggle" aria-label="toggle navigation">
                <span class="hamburger"></span>
            </button>
            <nav class="nav-links">
                <a href="index.html" class="nav-item">Home</a>
                <a href="dashboard.html" class="nav-item active">Dashboard</a>
                <a href="challenge.html" class="nav-item">100-Day Challenge</a>
                <a href="achievements.html" class="nav-item">Achievements</a>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode">🌙</button>
            </nav>
        </div>
    </header>

    <main class="dashboard-section">
        <h2 class="section-heading">Your Savings Dashboard</h2>
        
        <div class="dashboard-grid">
            <div class="feature-card">
                <h3>Set Financial Targets</h3>
                <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Update your target milestones below to re-calculate your savings journey progress dynamically.</p>
                
                <div class="input-group">
                    <label for="goal-amount">Savings Goal Target ($)</label>
                    <input type="number" id="goal-amount" placeholder="e.g. 5000" min="0">
                </div>
                
                <div class="input-group">
                    <label for="current-saved">Current Stashed Amount ($)</label>
                    <input type="number" id="current-saved" placeholder="e.g. 1200" min="0">
                </div>
                
                <button id="save-dashboard-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Update Tracker</button>
            </div>

            <div class="feature-card" style="display: flex; flex-direction: column; justify-content: space-between;">
                <div>
                    <h3>Current Status</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Visual breakdown of your active wealth milestone progression.</p>
